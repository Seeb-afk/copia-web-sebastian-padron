<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copia de Starlink - Sebastian Pdron</title>
    <link rel="stylesheet" href="./styles.css">
    <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

              <h2 id="logo">STARLINK</h2>
              <a class="" href="#">Residencial</a>
              <a class="" href="#">Itinerante</a>
            </div>
            <div class="start-menu rows">
              <div class="rows buttons-menu">
                <button class="button-active">Personal</button>
                <button class="button-inactive">Para empresa</button>
              </div>
              <button class="circular-button">
                  <i class="fa-solid fa-bars"></i>
              </button>
            </div>
          </div>
        </nav>
        <div class="principal-text">
          <div class="location-grid columns">
            <h1>Internet rápido y asequible</h1>
            <p>DESDE</p>
            <h2>35 $<span>/mes</span></h2>
          </div>
          <div class="location-grid flex">
            <button class="white-button">Empieza</button>
            <button class="grey-button">Ver precios</button>
          </div>
        </div>
      </header>
      
      <section class="section-2 rows">
